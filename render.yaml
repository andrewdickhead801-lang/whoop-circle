# Render blueprint — provisions the web service + a persistent Postgres DB.
services:
  - type: web
    name: whoop-circle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHOOP_CLIENT_ID
        sync: false            # you paste this in the Render dashboard (kept private)
      - key: WHOOP_CLIENT_SECRET
        sync: false            # you paste this in the Render dashboard (kept private)
      - key: APP_BASE_URL
        sync: false            # e.g. https://whoop-circle.onrender.com
      - key: APP_SECRET
        generateValue: true    # Render generates a random signing secret
      - key: DATABASE_URL
        fromDatabase:
          name: whoop-circle-db
          property: connectionString

databases:
  - name: whoop-circle-db
    plan: free
